services:
  - type: web
    name: zerodha-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGO_URL
        sync: false

  - type: static
    name: zerodha-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build

  - type: static
    name: zerodha-dashboard
    rootDir: dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: build